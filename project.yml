# xcodegen project spec — run: xcodegen generate
name: VRMFacialTracker
options:
  deploymentTarget:
    iOS: "17.0"
    macOS: "13.0"
  xcodeVersion: "15.0"
  groupSortPosition: top
  generateEmptyDirectories: true
  createIntermediateGroups: true

packages:
  GLTFKit2:
    url: https://github.com/warrenm/GLTFKit2
    from: 0.5.0

# ─── iPhone App ───────────────────────────────────────────────────────────────
targets:
  VRMTrackerPhone:
    type: application
    platform: iOS
    sources:
      - path: Shared
        createIntermediateGroups: true
      - path: iOS
        createIntermediateGroups: true
    dependencies:
      - package: GLTFKit2
        product: GLTFKit2
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: jp.chibatech.vrmtracker.phone
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
      SWIFT_VERSION: "5.9"
      TARGETED_DEVICE_FAMILY: "1"
    info:
      path: iOS/App/Info.plist
      properties:
        NSCameraUsageDescription: "ARKit による表情・手のトラッキングにカメラが必要です。"
        NSLocalNetworkUsageDescription: "Mac への接続に使用します。"
        NSBonjourServices:
          - "_vrm-tracker._tcp"
          - "_vrm-tracker._udp"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait

# ─── Mac App ──────────────────────────────────────────────────────────────────
  VRMTrackerMac:
    type: application
    platform: macOS
    sources:
      - path: Shared
        createIntermediateGroups: true
      - path: macOS
        createIntermediateGroups: true
        excludes:
          - Frameworks/**    # don't compile .framework contents as source
    dependencies:
      - package: GLTFKit2
        product: GLTFKit2
      - framework: macOS/Frameworks/Syphon.framework
        embed: true
        codeSign: false
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: jp.chibatech.vrmtracker.mac
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
      SWIFT_VERSION: "5.9"
      MACOSX_DEPLOYMENT_TARGET: "13.0"
      ENABLE_APP_SANDBOX: NO
      SWIFT_OBJC_BRIDGING_HEADER: macOS/BridgingHeader.h
      LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
      FRAMEWORK_SEARCH_PATHS: "$(inherited) $(PROJECT_DIR)/macOS/Frameworks"
    info:
      path: macOS/App/Info.plist
      properties:
        NSLocalNetworkUsageDescription: "iPhone からのトラッキングデータ受信に使用します。"
        NSBonjourServices:
          - "_vrm-tracker._tcp"
          - "_vrm-tracker._udp"
        NSPrincipalClass: NSApplication
